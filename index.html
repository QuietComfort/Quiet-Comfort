<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Quiet Comfort Project</title>

<style>

body{
    margin:0;
    background:#f3ebe2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
}

/* container keeps flyer centered */

.container{
    width:100%;
    max-width:1100px;
    padding:10px;
}

/* flyer image */

.flyer{
    width:100%;
    height:auto;
    display:block;
    border-radius:10px;
    box-shadow:0 10px 35px rgba(0,0,0,.15);
}

/* subtle footer */

.footer{
    text-align:center;
    font-size:13px;
    color:#6b5b4b;
    margin-top:12px;
}

</style>

</head>


<body>

<div class="container">

<img src="banner.png" class="flyer" alt="The Quiet Comfort Project">

<div class="footer">
The Quiet Comfort Project • hello@thequietcomfortproject.org
</div>

</div>

</body>

</html>
